spring:
  application:
    name: RESTAURANT-SERVICE

  kafka:
    listener:
      observation-enabled: true
    template:
      observation-enabled: true

management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    level: "%5p [%X{traceId:-},%X{spanId:-}]"